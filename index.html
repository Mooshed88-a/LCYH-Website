<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>凌城烟火</title>
    <link rel="stylesheet" href="./assets/css/site.css" />
    <script>
      var introTarget = window.location.protocol === "file:"
        ? "./intro/index.html"
        : "/intro/";

      window.setTimeout(function () {
        window.location.replace(introTarget);
      }, 1200);

      window.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll("[data-intro-link]").forEach(function (link) {
          link.href = introTarget;
        });
      });
    </script>
  </head>
  <body class="home-redirect">
    <main class="redirect-shell" aria-live="polite">
      <p class="redirect-kicker">凌城烟火</p>
      <h1>主页正在制作</h1>
      <p>已自动跳转至服务器介绍页。</p>
      <a class="text-link" data-intro-link href="/intro/">立即前往介绍页</a>
    </main>
    <noscript>
      <p class="noscript-tip">
        主页正在制作，请打开 <a href="/intro/">服务器介绍页</a>。
      </p>
    </noscript>
  </body>
</html>
